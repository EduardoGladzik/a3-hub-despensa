services:
  db:
    image: postgres:15
    container_name: a3hub_postgres
    restart: always
    environment:
      POSTGRES_USER: a3hub
      POSTGRES_PASSWORD: a3hub
      POSTGRES_DB: a3hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:alpine
    container_name: a3hub_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: